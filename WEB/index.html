<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <script>
        // 💡 瞬时预判：在页面加载任何东西之前，先从浏览器本地缓存读取主题
        (function() {
            const savedTheme = localStorage.getItem('app-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <meta charset="UTF-8">
    <style>
        :root {
            /* 使用系统预装的高级字体，完全不需要网络加载 */
            --font-main: 'Segoe UI', 'SF Pro Display', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }
        body { font-family: var(--font-main); }
    </style>

    </head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeAsi v5.3 — 全能番剧中枢</title>
<script src="lucide.min.js" defer></script>
<style>
  /* 💡 增加两侧间距，让卡片不再紧贴边缘 */
.layout { 
  position: relative; 
  z-index: 1; 
  max-width: 1280px; 
  margin: 0 auto; 
  padding: 0 40px; /* 从 24px 增加到 40px */
}

/* 💡 优化网格，增加间距并微调卡片大小 */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); /* 稍微调大一点最小宽度 */
  gap: 24px; /* 间距从 16px 增加到 24px */
  padding-bottom: 40px; /* 底部留白 */
}
  /* ── CSS Variables ── */
  :root {
    --bg:        #0d0f1a;
    --bg2:       #141728;
    --bg3:       #1a1f35;
    --bg4:       #1e2440;
    --border:    #252a45;
    --border2:   #2e3558;
    --accent:    #7c6dfa;
    --accent2:   #9d91ff;
    --accent-d:  #3d3680;
    --pink:      #ff6b9d;
    --pink-d:    #6b2040;
    --txt1:      #e8e4ff;
    --txt2:      #8f8ab5;
    --txt3:      #4a4670;
    --card-bg:   #141728;
    --panel-bg:  #1a1f35;
    --shadow:    0 4px 16px rgba(0,0,0,0.32);
    --shadow-sm: 0 2px 12px rgba(0,0,0,0.3);
    --r:         12px;
    --r-sm:      8px;
    --glow:      0 0 10px rgba(124,109,250,0.12);
  }
  [data-theme="light"] {
    --bg:        #f4f3ff;
    --bg2:       #ffffff;
    --bg3:       #ede9ff;
    --bg4:       #e0d9ff;
    --border:    #d4cef7;
    --border2:   #c0b8f0;
    --accent:    #6b5cf0;
    --accent2:   #8574f5;
    --accent-d:  #c5beff;
    --pink:      #e8507a;
    --pink-d:    #ffd6e3;
    --txt1:      #1a1630;
    --txt2:      #5a5280;
    --txt3:      #a09cc0;
    --card-bg:   #ffffff;
    --panel-bg:  #f0eeff;
    --shadow:    0 8px 32px rgba(100,80,200,0.12);
    --shadow-sm: 0 2px 12px rgba(100,80,200,0.08);
    --glow:      0 0 20px rgba(107,92,240,0.15);
  }

  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--txt1);
    min-height: 100vh;
    transition: background 0.4s, color 0.4s;
    overflow-x: hidden;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent-d); }

  /* ── Background Texture ── */


  /* ── Layout ── */
  .layout { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 0 24px; }

  /* ══════════════════════════════════════
     NAVBAR
  ══════════════════════════════════════ */
  .navbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,15,26,0.85);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    transition: background 0.4s, border-color 0.4s;
  }
  [data-theme="light"] .navbar {
    background: rgba(244,243,255,0.85);
  }
  .navbar-inner {
    display: flex; align-items: center; gap: 16px;
    height: 64px;
    max-width: 1280px; margin: 0 auto; padding: 0 24px;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    text-decoration: none; flex-shrink: 0;
  }
  .logo-mark {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--pink));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff;
    box-shadow: 0 4px 12px rgba(124,109,250,0.4);
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .logo:hover .logo-mark { transform: rotate(-6deg) scale(1.1); box-shadow: 0 6px 20px rgba(124,109,250,0.5); }
  .logo-text {
    font-size: 18px; font-weight: 700;
    background: linear-gradient(135deg, var(--txt1) 40%, var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.3px;
  }

  /* Search */
  .search-wrap {
    flex: 1; max-width: 420px;
    position: relative;
  }
  .search-wrap .icon-search {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--txt3); pointer-events: none;
  }
  .search-input {
    width: 100%; height: 38px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 99px;
    color: var(--txt1);
    font-family: inherit; font-size: 13px;
    padding: 0 16px 0 38px;
    outline: none;
    transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
  }
  .search-input::placeholder { color: var(--txt3); }
  .search-input:focus {
    border-color: var(--accent);
    background: var(--bg4);
    box-shadow: 0 0 0 3px rgba(124,109,250,0.15);
  }

  /* Nav actions */
  .nav-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }

  /* Theme toggle */
  .theme-toggle {
    width: 52px; height: 28px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 99px;
    position: relative; cursor: pointer;
    transition: background 0.3s, border-color 0.3s;
    flex-shrink: 0;
  }
  .theme-toggle:hover { border-color: var(--accent); }
  .theme-toggle-thumb {
    width: 20px; height: 20px;
    background: linear-gradient(135deg, var(--accent), var(--pink));
    border-radius: 50%;
    position: absolute; top: 3px; left: 3px;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; box-shadow: 0 2px 8px rgba(124,109,250,0.4);
  }
  [data-theme="light"] .theme-toggle-thumb { transform: translateX(24px); }

  .icon-btn {
    width: 36px; height: 36px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--txt2);
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  .icon-btn:hover {
    background: var(--bg4); border-color: var(--accent);
    color: var(--accent); box-shadow: var(--glow);
  }

  /* ══════════════════════════════════════
     MAIN CONTENT
  ══════════════════════════════════════ */
  .main { padding: 28px 0 60px; }

  /* Section header */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 13px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--txt3);
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before {
    content: '';
    display: block; width: 3px; height: 14px;
    background: linear-gradient(to bottom, var(--accent), var(--pink));
    border-radius: 99px;
  }

  /* ── Weekly Schedule ── */
  .schedule-wrap {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 16px 20px;
    margin-bottom: 28px;
    box-shadow: var(--shadow-sm);
  }
  .schedule-days {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .day-btn {
    flex: 1; min-width: 68px;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 10px 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    cursor: pointer; color: var(--txt2);
    transition: all 0.25s cubic-bezier(0.34,1.2,0.64,1);
    position: relative; overflow: hidden;
  }
  .day-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--accent), var(--pink));
    opacity: 0; transition: opacity 0.25s;
  }
  .day-btn:hover { border-color: var(--accent); color: var(--txt1); transform: translateY(-2px); box-shadow: var(--glow); }
  .day-btn.active {
    background: linear-gradient(135deg, var(--accent), #9b7ffc);
    border-color: var(--accent); color: #fff;
    box-shadow: 0 6px 20px rgba(124,109,250,0.4);
    transform: translateY(-2px);
  }
  .day-btn.today:not(.active) {
    border-color: var(--pink);
    color: var(--pink);
  }
  .day-btn.today:not(.active) .day-date { color: var(--pink); }
  .day-btn.active.today {
    background: linear-gradient(135deg, var(--pink), #c84580);
    border-color: var(--pink);
    box-shadow: 0 6px 20px rgba(255,107,157,0.4);
  }
  .day-date { font-size: 11px; font-weight: 500; color: var(--txt3); transition: color 0.25s; }
  .day-btn.active .day-date, .day-btn.today:not(.active) .day-date {}
  .day-name { font-size: 13px; font-weight: 600; }
  .today-dot {
    width: 5px; height: 5px;
    background: var(--pink);
    border-radius: 50%;
    position: absolute; bottom: 6px;
  }
  .day-btn:not(.today) .today-dot { display: none; }

  /* ── Anime Count Badge ── */
  .count-badge {
    font-size: 11px; font-weight: 600;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 99px; padding: 2px 10px; color: var(--txt3);
  }

  /* ══════════════════════════════════════
     CARD GRID
  ══════════════════════════════════════ */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
    gap: 16px;
  }

  .anime-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1), box-shadow 0.3s, border-color 0.3s;
    position: relative;
  }
  .anime-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 16px 40px rgba(0,0,0,0.4), var(--glow);
    border-color: var(--accent);
  }

  /* Poster */
  .card-poster {
    position: relative;
    aspect-ratio: 120 / 162;
    overflow: hidden;
    background: var(--bg3);
  }
  .card-poster img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
    display: block;
  }
  .anime-card:hover .card-poster img {transform: scale(1.03);}

  /* Placeholder when no image */
  .poster-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; color: var(--txt3);
    background: linear-gradient(135deg, var(--bg3), var(--bg4));
    font-size: 11px;
  }

  /* Title overlay */
  .card-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(8,8,18,0.95) 0%, rgba(8,8,18,0.5) 60%, transparent 100%);
    padding: 24px 10px 10px;
    transition: opacity 0.3s;
  }
  [data-theme="light"] .card-overlay {
    background: linear-gradient(to top, rgba(20,16,50,0.9) 0%, rgba(20,16,50,0.4) 60%, transparent 100%);
  }
  .card-overlay-title {
    font-size: 11px; font-weight: 600; color: #fff;
    line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    line-clamp: text;
    overflow: hidden;
  }

  /* Heart btn */
  .heart-btn {
    position: absolute; top: 8px; right: 8px;
    width: 28px; height: 28px;
    background: rgba(13,15,26,0.7);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--txt3);
    transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    backdrop-filter: blur(4px);
  }
  .heart-btn:hover { background: rgba(255,107,157,0.2); border-color: var(--pink); color: var(--pink); transform: scale(1.15); }
  .heart-btn.liked { background: rgba(255,107,157,0.25); border-color: var(--pink); color: var(--pink); }
  .heart-btn.liked svg { fill: var(--pink); }

  /* Play button overlay (收藏卡片 hover 显示) */
  .play-btn-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.25s ease;
    cursor: pointer;
    z-index: 2;
  }
  .play-btn-overlay:hover { opacity: 1 !important; }
  .anime-card:hover .play-btn-overlay { opacity: 1; }
  .play-btn-overlay .play-circle {
    width: 48px; height: 48px;
    background: rgba(124,109,250,0.9);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
    box-shadow: 0 4px 20px rgba(124,109,250,0.5);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .play-btn-overlay:hover .play-circle {
    transform: scale(1.1);
    box-shadow: 0 6px 28px rgba(124,109,250,0.7);
  }
  .play-btn-overlay .play-circle svg {
    width: 20px; height: 20px;
    color: #fff;
    margin-left: 2px;
  }

  /* Episode list modal */
  .episode-list { max-height: 60vh; overflow-y: auto; padding: 8px 0; }
  .episode-item {
    display: flex; align-items: center;
    padding: 10px 24px;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .episode-item:last-child { border-bottom: none; }
  .episode-item:hover { background: var(--bg3); }

  .episode-watched {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--txt3);
    transition: background 0.2s;
  }
  .episode-watched.done { background: var(--accent); box-shadow: 0 0 8px rgba(124,109,250,0.4); }

  .episode-name {
    flex: 1;
    font-size: 13px; color: var(--txt1);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .episode-number {
    font-size: 15px; font-weight: 700;
    color: var(--accent);
    min-width: 48px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .episode-play-btn {
    width: 32px; height: 32px;
    border: none; border-radius: 50%;
    background: var(--bg3);
    color: var(--txt2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .episode-play-btn:hover {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 12px rgba(124,109,250,0.4);
    transform: scale(1.1);
  }
  .episode-empty {
    text-align: center;
    padding: 48px 24px;
    color: var(--txt3);
    font-size: 13px;
  }

  /* New badge */
  .new-badge {
    position: absolute; top: 8px; left: 8px;
    background: linear-gradient(135deg, var(--accent), var(--pink));
    color: #fff; font-size: 9px; font-weight: 700;
    padding: 2px 7px; border-radius: 99px;
    letter-spacing: 0.5px; text-transform: uppercase;
  }

  /* Card body (buttons) */
  .card-body {
    padding: 10px;
    display: flex; gap: 6px;
    border-top: 1px solid var(--border);
    background: var(--card-bg);
  }
  .card-btn {
    flex: 1; height: 32px;
    border-radius: var(--r-sm);
    font-family: inherit; font-size: 11px; font-weight: 600;
    cursor: pointer; border: none; outline: none;
    display: flex; align-items: center; justify-content: center; gap: 4px;
    transition: all 0.2s;
  }
  .btn-detail {
    background: var(--bg3);
    color: var(--txt2);
    border: 1px solid var(--border);
  }
  .btn-detail:hover { background: var(--bg4); color: var(--txt1); border-color: var(--border2); }
  .btn-dl {
    background: linear-gradient(135deg, var(--accent), #9b7ffc);
    color: #fff;
    box-shadow: 0 4px 12px rgba(124,109,250,0.3);
  }
  .btn-dl:hover { box-shadow: 0 6px 20px rgba(124,109,250,0.5); transform: translateY(-1px); filter: brightness(1.1); }

  /* ══════════════════════════════════════
     MODAL BASE
  ══════════════════════════════════════ */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(5,5,15,0.75);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 16px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    transform: translateY(24px) scale(0.97);
    transition: transform 0.35s cubic-bezier(0.34,1.2,0.64,1);
    width: 100%; max-width: 520px;
    max-height: 80vh;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .modal-title { font-size: 16px; font-weight: 700; color: var(--txt1); }
  .modal-subtitle { font-size: 12px; color: var(--txt3); margin-top: 2px; }
  .modal-close {
    width: 32px; height: 32px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; cursor: pointer; color: var(--txt2);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .modal-close:hover { background: var(--bg4); color: var(--txt1); border-color: var(--border2); }
  .modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; justify-content: flex-end;
    flex-shrink: 0;
  }

  /* ══════════════════════════════════════
     DOWNLOAD MODAL
  ══════════════════════════════════════ */
  .path-row {
    display: flex; gap: 8px; margin-bottom: 20px;
  }
  .path-input {
    flex: 1; height: 38px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--r-sm); color: var(--txt1);
    font-family: inherit; font-size: 12px; padding: 0 12px;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    font-family: 'Courier New', monospace;
  }
  .path-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,109,250,0.12); }
  .path-input::placeholder { color: var(--txt3); font-family: inherit; }

  .btn-browse {
    height: 38px; padding: 0 16px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--r-sm); color: var(--txt2);
    font-family: inherit; font-size: 12px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
    transition: all 0.2s;
  }
  .btn-browse:hover { background: var(--bg4); border-color: var(--border2); color: var(--txt1); }

  .torrent-list-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1px; color: var(--txt3); margin-bottom: 10px;
  }
  .torrent-list {
    display: flex; flex-direction: column; gap: 6px;
    max-height: 400px; overflow-y: auto;
    padding-right: 4px;
  }
  .torrent-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    transition: border-color 0.2s, background 0.2s;
  }
  .torrent-row:hover { border-color: var(--accent); background: var(--bg4); }
  .torrent-icon { color: var(--accent); flex-shrink: 0; }
  .torrent-info { flex: 1; min-width: 0; }
  .torrent-name {
    font-size: 12px; color: var(--txt1); font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .torrent-meta { font-size: 10px; color: var(--txt3); margin-top: 2px; }

<script>
// ================= 1. 核心变量 =================
// 判断字符串中是否包含日语假名（平假名/片假名）
const isJapanese = (str) => /[\u3040-\u309F\u30A0-\u30FF]/.test(str);
let globalBgmData = [];
let globalFavorites = [];
let globalRssSources = [];
let activeDay = (new Date().getDay() + 6) % 7;
const TODAY_IDX = activeDay;

function safeCreateIcons() {
    try {
        if (typeof lucide !== 'undefined' && typeof lucide.createIcons === 'function') {
            lucide.createIcons(); 
        }
    } catch (e) {
        console.warn("图标库渲染跳过:", e);
    }
}

// ================= 2. 初始化逻辑 =================
document.addEventListener('DOMContentLoaded', () => {
    const sBtn = document.getElementById('settingsBtn');
    if (sBtn) {
        sBtn.onclick = () => {
            openModal('settingsModal');
        };
    }
    
    // 💡 修复 1：正确获取收藏按钮元素
    const favBtn = document.getElementById('favBtn');
    if (favBtn) {
        favBtn.onclick = () => {
            renderFavGrid(); // 打开前重新渲染一次
            openModal('favModal');
        };
    }
    requestAnimationFrame(() => {
    safeCreateIcons();
});
});

window.addEventListener('pywebviewready', async () => {
    try {
        const [config, favs] = await Promise.all([
            pywebview.api.get_init_config(),
            pywebview.api.get_favorites()
        ]);
        
        // 💡 最终校准：以 Python 的 config.json 为准
        const finalTheme = config.theme || 'dark';
        document.documentElement.setAttribute('data-theme', finalTheme);
        // 同步更新本地缓存，供下次启动“瞬时预判”使用
        localStorage.setItem('app-theme', finalTheme);
        
        const iconEl = document.getElementById('themeIcon');
        if(iconEl) iconEl.textContent = finalTheme === 'light' ? '☀️' : '🌙';

        globalFavorites = favs || [];
        fillSettings(config);
        if (!config.local_anime_path) openModal('settingsModal');
        refreshAllData();
    } catch (e) {
        console.error("初始化失败:", e);
    }
});

// ================= 3. 数据获取与渲染 =================
async function refreshAllData() {
    try {
        // 1. 安全读取本地缓存和上次更新的时间戳
        const rawLocalData = localStorage.getItem('last_bgm_data');
        const lastUpdate = localStorage.getItem('last_bgm_update_time');
        const now = new Date().getTime();
        let hasValidCache = false;

        // 2. 瞬时渲染逻辑：如果有缓存，且距离上次更新不超过 7 天
        if (rawLocalData && lastUpdate) {
            const timeDiff = now - parseInt(lastUpdate);
            if (timeDiff < 604800000) { // 7天的毫秒数
                const localData = JSON.parse(rawLocalData);
                // 瞬间赋值并渲染 UI，实现“秒开”
                globalBgmData = localData;
                buildScheduleButtons();
                renderAnimeGrid();
                hasValidCache = true; 
            }
        }

        // 3. UI 反馈：如果没有秒开，才显示加载动画
        if (!hasValidCache) {
            showToast('同步 Bangumi 数据...', 'loader');
        }

        // 4. 异步请求最新数据（无论有没有缓存，这步都会在后台静默执行）
        setTimeout(async () => {
    const freshData = await pywebview.api.get_bgm_data();

    if (freshData && freshData.length > 0) {
        globalBgmData = freshData;
        buildScheduleButtons();
        renderAnimeGrid();

        localStorage.setItem('last_bgm_data', JSON.stringify(freshData));
        localStorage.setItem('last_bgm_update_time', now.toString());

        if (!hasValidCache) {
            showToast('时刻表已更新');
        }
    }
}, 100);
    } catch (e) {
        console.error("加载番剧数据时发生错误:", e);
        showToast('获取数据失败', 'alert-circle');
    }
}

// 自动计算本周的日期 (MM-DD)
const WEEK_DATES = (() => {
    const now = new Date();
    const mon = new Date(now); 
    mon.setDate(now.getDate() - ((now.getDay() + 6) % 7));
    return Array.from({length: 7}, (_, i) => {
        const d = new Date(mon);
        d.setDate(mon.getDate() + i);
        return `${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    });
})();

function buildScheduleButtons() {
    const wrap = document.getElementById('scheduleDays');
    if(!wrap) return;
    wrap.innerHTML = '';
    const dayNames = ["周一","周二","周三","周四","周五","周六","周日"];
    
    dayNames.forEach((name, i) => {
        const btn = document.createElement('div');
        btn.className = `day-btn${i===activeDay?' active':''}${i===TODAY_IDX?' today':''}`;
        
        btn.innerHTML = `
            <span class="day-date">${WEEK_DATES[i]}</span>
            <span class="day-name">${name}</span>
            ${i===TODAY_IDX ? '<span class="today-dot"></span>' : ''}
        `;
        
        btn.onclick = () => {
            activeDay = i;
            buildScheduleButtons();
            renderAnimeGrid();
        };
        wrap.appendChild(btn);
    });
}

// 💡 修复 2：去掉了重复套娃的 function 声明
async function renderAnimeGrid() {
    const grid = document.getElementById('cardGrid');
    if (!grid) return;

    grid.innerHTML = '';

    const config = await pywebview.api.get_init_config();
    let items = globalBgmData[activeDay]?.items || [];

    if (config.only_show_japanese) {
        items = items.filter(item => isJapanese(item.name));
    }

    document.getElementById('countBadge').textContent = `${items.length} 部`;

// 处理爱心点击逻辑
async function handleToggleFav(event, name, img, url, btnElement) {
    event.stopPropagation(); // 阻止点击穿透
    
    const animeData = { name, img, url };
    const res = await pywebview.api.toggle_favorite(animeData);
    
    if (res.status === 'success') {
        if (res.is_favorite) {
            btnElement.classList.add('liked');
            globalFavorites.push(animeData); 
            showToast('已加入收藏 ♥');
        } else {
            btnElement.classList.remove('liked');
            globalFavorites = globalFavorites.filter(f => f.name !== name);
            showToast('已取消收藏');
        }
    }
}

async function updateCacheSize() {
    const size = await pywebview.api.get_cache_size();
    const el = document.getElementById('cacheSizeText');
    if (el) el.textContent = `当前占用空间: ${size}`;
}

async function handleClearCache() {
    showToast('正在清理缓存碎片...');
    const res = await pywebview.api.clear_cache();
    if (res.status === 'success') {
        setTimeout(() => {
            showToast('清理完成，释放硬盘空间！');

// ================= 4. 功能交互逻辑 =================
async function handleSearch(keyword) {
    const searchVal = keyword || document.getElementById('globalSearch').value;
    if (!searchVal) return;

    showToast(`检索资源: ${searchVal}...`, 'search');
    try {
        const res = await pywebview.api.search_torrents(searchVal);
        if (res.status === 'success') {
            renderTorrentList(searchVal, res.results);
            openModal('dlModal');
        } else {
            showToast('未找到相关资源', 'alert-circle');
        }
    } catch (e) {
        showToast('搜索出错', 'x-circle');
    }
}

function renderTorrentList(animeName, results) {
    const list = document.getElementById('torrentList');
    document.getElementById('dlModalTitle').textContent = animeName;
    if(!list) return;
    list.innerHTML = '';
    
    pywebview.api.get_init_config().then(conf => {
        const safeName = animeName.replace(/[\\/:*?"<>|]/g, '_');
        document.getElementById('dlPath').value = (conf.local_anime_path || "E:\\ANIME") + "\\" + safeName;
    });

    results.forEach(t => {
        const row = document.createElement('div');
        row.className = 'torrent-row';
        row.innerHTML = `
            <div class="torrent-info"><div class="torrent-name" title="${t.title}">${t.title}</div></div>
            <button class="btn-push" onclick="executePush('${t.url}', '${animeName}', this)">推送</button>
        `;
        list.appendChild(row);
    });
}

async function executePush(url, name, btn) {
    const path = document.getElementById('dlPath').value;
    btn.disabled = true;
    btn.textContent = '传送中...';
    
    try {
        const res = await pywebview.api.push_download(url, name, path);
        if (res.status === 'success') {
            btn.textContent = '✓ 已发送';
            btn.style.background = '#2e7d32';
            showToast('已推送到 qBittorrent');
        } else {
            btn.disabled = false;
            btn.textContent = '重试';
            showToast('失败: ' + res.message, 'alert-triangle');
        }
    } catch (e) {
        showToast('连接失败', 'x-circle');
    }
}

async function handleBrowseFolder(targetId) {
    const path = await pywebview.api.select_folder();
    if (path) {
        const target = targetId || 'dlPath';
        const inputEl = document.getElementById(target);
        if (inputEl) {
            inputEl.value = path;
        }
    }
}

function fillSettings(c) {
    const p = document.getElementById('set_anime_path');
    const h = document.getElementById('set_qbt_host');
    const ps = document.getElementById('set_qbt_pass');
    const proxyToggle = document.getElementById('set_use_proxy');
    const proxyAddr = document.getElementById('set_proxy_address');
    const jpToggle = document.getElementById('set_only_jp');

    if(p) p.value = c.local_anime_path || '';
    if(h) h.value = c.qbt_host || '';
    if(ps) ps.value = c.qbt_password || '';
    
    if(proxyToggle) {
        if(c.use_proxy) proxyToggle.classList.add('on');
        else proxyToggle.classList.remove('on');
    }
    if(proxyAddr) proxyAddr.value = c.proxy_address || '127.0.0.1:7890';
    
    if(jpToggle) {
        if(c.only_show_japanese) jpToggle.classList.add('on');
        else jpToggle.classList.remove('on');
    }

    // ─── 加载 RSS 订阅源 ───────────────────────────
    globalRssSources = c.rss_sources || [];
    renderRssSources();
}

async function saveAppSettings() {
    const newConf = {
        local_anime_path: document.getElementById('set_anime_path').value,
        qbt_host: document.getElementById('set_qbt_host').value,
        qbt_password: document.getElementById('set_qbt_pass').value,
        use_proxy: document.getElementById('set_use_proxy')?.classList.contains('on') || false,
        proxy_address: document.getElementById('set_proxy_address')?.value || '127.0.0.1:7890',
        only_show_japanese: document.getElementById('set_only_jp')?.classList.contains('on') || false
    };
    
    // 读取当前 RSS 源 UI 数据
    collectRssSourcesFromUI();

    await pywebview.api.save_config(newConf);
    await pywebview.api.save_rss_sources(globalRssSources);
    closeModal('settingsModal');
    showToast('设置已保存');
    refreshAllData();
}

// 模态框控制

// Toast 提醒
let toastTimer;
function showToast(msg, icon='check-circle') {
  const toast = document.getElementById('toast');
  const txt = document.getElementById('toastText');
  if(txt) txt.textContent = msg;
  if(toast) {
    toast.classList.add('show');

}

// ─── RSS 订阅源管理 ──────────────────────────────────

function renderRssSources() {
    const list = document.getElementById('rssSourceList');
    if (!list) return;
    list.innerHTML = '';

    globalRssSources.forEach((src, i) => {
        const row = document.createElement('div');
        row.style.cssText = 'display: flex; flex-direction: column; gap: 6px; padding: 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r-sm); margin-bottom: 8px; transition: border-color 0.2s;';
        row.dataset.index = i;

        row.innerHTML = `
            <div style="display: flex; align-items: center; gap: 8px;">
                <input class="form-input" type="text" value="${escHtml(src.name)}" placeholder="订阅源名称" data-field="name" style="flex: 0 0 120px; height: 32px; font-size: 12px; font-family: inherit;">
                <input class="form-input" type="text" value="${escHtml(src.url_template)}" placeholder="https://example.com/rss?q={keyword}" data-field="url" style="flex: 1; height: 32px; font-size: 12px;">
                <div class="toggle-switch ${src.enabled ? 'on' : ''}" onclick="this.classList.toggle('on')" title="启用/禁用" style="flex-shrink: 0;"></div>
                <button onclick="removeRssSource(${i})" style="width: 28px; height: 28px; background: var(--pink-d); border: 1px solid var(--pink); border-radius: 6px; color: var(--pink); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; font-weight: 700; transition: all 0.2s;">✕</button>
            </div>
            <div style="font-size: 10px; color: var(--txt3); padding-left: 4px;">
                提示: 用 <code style="background: var(--bg4); padding: 1px 4px; border-radius: 3px;">{keyword}</code> 表示搜索关键词的位置
            </div>
        `;
        list.appendChild(row);
    });

    if (globalRssSources.length === 0) {
        list.innerHTML = '<div style="padding: 16px; text-align: center; color: var(--txt3); font-size: 13px;">暂无订阅源，点击上方按钮添加</div>';
    }
}

function escHtml(str) {
    return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function addRssSource(name, url) {
    globalRssSources.push({
        name: name || '新订阅源',
        url_template: url || 'https://example.com/rss?q={keyword}',
        enabled: true,
    });
    renderRssSources();
}

function removeRssSource(index) {
    globalRssSources.splice(index, 1);
    renderRssSources();
}

function collectRssSourcesFromUI() {
    const list = document.getElementById('rssSourceList');
    if (!list) return;
    const rows = list.children;
    globalRssSources = [];
    for (const row of rows) {
        const inputs = row.querySelectorAll('input[data-field]');
        const toggle = row.querySelector('.toggle-switch');
        if (inputs.length < 2) continue;
        globalRssSources.push({
            name: inputs[0].value || '未命名',
            url_template: inputs[1].value || '',
            enabled: toggle ? toggle.classList.contains('on') : false,
        });
    }
}

async function togglePresetMenu() {
    const menu = document.getElementById('presetMenu');
    if (menu.style.display === 'block') {
        menu.style.display = 'none';
        return;
    }
    menu.innerHTML = '<div style="padding: 8px 12px; color: var(--txt3); font-size: 12px;">加载中...</div>';
    menu.style.display = 'block';

    try {
        const presets = await pywebview.api.get_rss_presets();
        menu.innerHTML = presets.map((p, i) =>
            `<div onclick="applyPreset(${i})" style="padding: 8px 14px; cursor: pointer; font-size: 13px; color: var(--txt1); transition: background 0.15s; border-bottom: ${i < presets.length - 1 ? '1px solid var(--border)' : 'none'}"
                  onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background=''">
                <span style="font-weight: 600;">${escHtml(p.name)}</span>
                <span style="color: var(--txt3); font-size: 11px; margin-left: 8px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${escHtml(p.url_template)}</span>
            </div>`
        ).join('');
    } catch (e) {
        menu.innerHTML = '<div style="padding: 8px 12px; color: var(--pink); font-size: 12px;">加载失败</div>';
    }
}

function applyPreset(index) {
    document.getElementById('presetMenu').style.display = 'none';
    pywebview.api.get_rss_presets().then(presets => {
        if (index < presets.length) {
            addRssSource(presets[index].name, presets[index].url_template);
        }
    });
}

// 点其他地方关闭预设菜单
document.addEventListener('click', function(e) {
    const menu = document.getElementById('presetMenu');
    if (menu && !e.target.closest('#presetMenu') && !e.target.closest('[onclick="togglePresetMenu()"]')) {
        menu.style.display = 'none';
    }
});

// 设置弹窗打开时刷新 RSS 源列表
const origOpenModal = openModal;
openModal = function(id) {
    origOpenModal(id);

// 主题切换
// 💡 找到这个 ID 对应的逻辑进行替换
const themeBtn = document.getElementById('themeToggle');

if(themeBtn) {
    themeBtn.onclick = async () => {
        const html = document.documentElement;
        // 1. 判断当前状态
        const isDark = html.getAttribute('data-theme') === 'dark';
        const newTheme = isDark ? 'light' : 'dark';
        
        // 2. 瞬间切换前端 UI 属性
        html.setAttribute('data-theme', newTheme);
        
        // 3. 同步更新图标（太阳/月亮）
        const iconEl = document.getElementById('themeIcon');
        if(iconEl) {
            iconEl.textContent = isDark ? '☀️' : '🌙';
        }
        
        // 4. 【核心升级】瞬时更新浏览器本地存储，供下次启动时脚本“预判”
        localStorage.setItem('app-theme', newTheme);
        
        // 5. 【核心升级】调用 Python 接口，永久写入 config.json
        try {
            await pywebview.api.save_config({ "theme": newTheme });
        } catch (e) {
            console.error("主题配置同步至后端失败:", e);
        }
    };
}

// ══════════════════════════════════════════
//  本地动画管理（剧集列表弹窗）
// ══════════════════════════════════════════

async function openEpisodeModal(animeName) {
        try {
            const data = await pywebview.api.get_anime_episodes(animeName);
            document.getElementById('episodeModalTitle').textContent = animeName;
            const sub = document.getElementById('episodeModalSubtitle');
            const list = document.getElementById('episodeList');
            list.innerHTML = '';

            if (!data.episodes || data.episodes.length === 0) {
                list.innerHTML = '<div class="episode-empty"><p>未找到本地剧集文件</p><p style="font-size:12px;margin-top:4px;color:var(--txt3)">请先在设置中配置正确的本地动漫库路径</p></div>';
                sub.textContent = '未找到文件';
                openModal('episodeModal');
                return;
            }

            sub.textContent = `共 ${data.episodes.length} 集`;

            data.episodes.forEach(ep => {
                const item = document.createElement('div');
                item.className = 'episode-item';
                item.innerHTML = `
                    <div class="episode-watched ${ep.watched ? 'done' : ''}"></div>
                    <span class="episode-name">${escapeHtml(ep.file)}</span>
                    <span class="episode-number">第 ${ep.episode} 集</span>
                    <button class="episode-play-btn" onclick="handlePlayEpisode(decodeURIComponent('${encodeURIComponent(animeName)}'), ${ep.episode}, decodeURIComponent('${encodeURIComponent(ep.path)}'))" title="播放">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="8,5 19,12 8,19"/></svg>
                    </button>
                `;
                list.appendChild(item);
            });

            openModal('episodeModal');
        } catch (e) {
            console.error('获取剧集列表失败:', e);
            showToast('获取剧集列表失败', 'alert-circle');
        }
}

async function handlePlayEpisode(animeName, episode, filePath) {
    try {
        const res = await pywebview.api.play_episode(animeName, episode, filePath);
        if (res.status === 'success') {
            showToast('正在播放...', 'play');
            openEpisodeModal(animeName);
        } else {
            showToast(res.message || '播放失败', 'alert-circle');
        }
    } catch (e) {
        console.error('播放失败:', e);
        showToast('播放失败', 'alert-circle');
    }
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}
